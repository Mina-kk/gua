<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>呱呱-个人引导页</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    min-height: 100dvh;
    font-family: system-ui, -apple-system, sans-serif;
    transition: background-color 0.5s ease, color 0.5s ease;
    overflow-x: hidden;
}
body.light {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    color: #333;
}
body.dark {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #eee;
}
.glass {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px) saturate(180%) brightness(0.95);
    -webkit-backdrop-filter: blur(12px) saturate(180%) brightness(0.95);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    border-radius: 20px;
}
.glass-dark {
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(12px) saturate(180%) brightness(0.8);
    -webkit-backdrop-filter: blur(12px) saturate(180%) brightness(0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    border-radius: 20px;
}
.bg-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('./img/bj.jpg');
    background-size: cover;
    background-position: center;
    filter: blur(20px) brightness(0.7);
    opacity: 0.6;
    z-index: -2;
    pointer-events: none;
}
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1000;
    transition: transform 0.3s ease;
}
.theme-toggle:hover {
    transform: scale(1.1);
}
.theme-icon {
    font-size: 0.95rem;
    font-weight: 700;
}
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    padding-top: 80px;
}
.header {
    text-align: center;
    margin-bottom: 40px;
}
.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 20px;
    border: 4px solid rgba(255, 255, 255, 0.3);
    animation: rotate 20s linear infinite;
}
@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
.links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    margin-top: 40px;
}
.link-card {
    padding: 25px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    min-height: 180px;
}
.link-card:hover {
    transform: translateY(-8px);
}
.link-icon {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 15px;
}
.title-main {
    display: inline-block;
    padding: 15px 30px;
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0 0 1rem;
}
.title-tip {
    display: inline-block;
    padding: 10px 20px;
    margin-top: 10px;
    font-size: 1.125rem;
}
.link-title {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 10px;
}
.link-desc {
    font-size: 0.95rem;
    opacity: 0.9;
    line-height: 1.5;
}
.footer {
    text-align: center;
    margin-top: 60px;
    padding: 20px;
    font-size: 0.9rem;
    opacity: 0.8;
}
@media (max-width: 768px) {
    .container {
        padding: 15px;
        padding-top: 70px;
    }
    .avatar {
        width: 100px;
        height: 100px;
    }
    .links-grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }
    .theme-toggle {
        top: 15px;
        right: 15px;
        width: 45px;
        height: 45px;
    }
}
</style>
</head>
<body class="light">
<div class="bg-layer"></div>
<div class="theme-toggle glass" id="themeToggle">
    <span class="theme-icon" id="themeIcon">深</span>
</div>
<div class="container">
    <div class="header">
        <div class="avatar">
            <img src="./img/xz.gif" alt="头像" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <h1 class="title-main glass">呱呱-个人引导页</h1>
        <p class="title-tip glass">Ctrl+D 收藏本页到浏览器收藏夹</p>
    </div>
    <div class="links-grid">
        <a href="./Reading/yuedu.html" class="link-card glass">
            <div class="link-icon">书</div>
            <div class="link-title">阅读书源去重</div>
            <div class="link-desc">整理与优化你的阅读资源，去除重复书源，提升阅读体验</div>
        </a>
        <a href="./DS/mfgy.html" class="link-card glass">
            <div class="link-icon">解</div>
            <div class="link-title">魔法工艺解密</div>
            <div class="link-desc">九宫格熄灯小游戏解密工具，包含随机生成与自动求解功能</div>
        </a>
</div>
    <footer class="footer">© 呱呱</footer>
</div>
<script>
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const body = document.body;
const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
body.classList.remove('light', 'dark');
body.classList.add(savedTheme);
updateToggleIcon();
function updateToggleIcon() {
    if (body.classList.contains('dark')) {
        themeIcon.textContent = '☀️';
        document.querySelectorAll('.glass').forEach(el => {
            el.classList.add('glass-dark');
            el.classList.remove('glass');
        });
    } else {
        themeIcon.textContent = '🌙';
        document.querySelectorAll('.glass-dark').forEach(el => {
            el.classList.add('glass');
            el.classList.remove('glass-dark');
        });
    }
}
themeToggle.addEventListener('click', () => {
    if (body.classList.contains('dark')) {
        body.classList.remove('dark');
        body.classList.add('light');
        localStorage.setItem('theme', 'light');
    } else {
        body.classList.remove('light');
        body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
    }
    updateToggleIcon();
});
window.addEventListener('storage', (e) => {
    if (e.key === 'theme') {
        body.classList.remove('light', 'dark');
        body.classList.add(e.newValue || 'light');
        updateToggleIcon();
    }
});
const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
mediaQuery.addEventListener('change', (e) => {
    if (!localStorage.getItem('theme')) {
        if (e.matches) {
            body.classList.add('dark');
            body.classList.remove('light');
        } else {
            body.classList.add('light');
            body.classList.remove('dark');
        }
        updateToggleIcon();
    }
});
document.querySelectorAll('.link-card').forEach(card => {
    card.addEventListener('mouseenter', () => {
        card.style.boxShadow = '0 15px 40px rgba(0, 0, 0, 0.2)';
    });
    card.addEventListener('mouseleave', () => {
        card.style.boxShadow = '';
    });
});
</script>
</body>
</html>
